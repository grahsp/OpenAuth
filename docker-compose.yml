services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: openauth-db
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sql_data:/var/opt/mssql

  server:
    build: server/
    image: openauth-server
    container_name: openauth-server
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Server=db;Database=OpenAuth;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
      Admin__Password: admin
      Seed__Demo: true

  dashboard:
    build: dashboard/
    image: openauth-dashboard
    container_name: openauth-dashboard
    depends_on:
      - server

  proxy:
    image: nginx:latest
    container_name: openauth-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - dashboard
      - server

volumes:
  sql_data:
