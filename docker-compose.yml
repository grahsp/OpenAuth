services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sql_data:/var/opt/mssql

  server:
    build: ./server
    image: openauth-server
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: ${ENVIRONMENT}
      ConnectionStrings__DefaultConnection: Server=db;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True
      Admin__Password: ${ADMIN_PASSWORD}
      Seed__Demo: ${SEED_DEMO}

  dashboard:
    build: ./dashboard
    image: openauth-dashboard
    depends_on:
      - server

  proxy:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - dashboard
      - server

volumes:
  sql_data:
